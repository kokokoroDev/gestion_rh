services:
  database:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: ${DB_DATABASE:-gestion_entreprise}
      MYSQL_USER: ${DB_USERNAME:-skatys}
      MYSQL_PASSWORD: ${DB_PASSWORD:-skatys1234}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./server/server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DB_HOST: database
      DB_PORT: ${DB_PORT:-3306}
      DB_DIALECT: ${DB_DIALECT:-mysql}
      DB_DATABASE: ${DB_DATABASE:-gestion_entreprise}
      DB_USERNAME: ${DB_USERNAME:-skatys}
      DB_PASSWORD: ${DB_PASSWORD:-skatys1234}
      SALT_ROUNDS: ${SALT_ROUNDS:-10}
      SECRET_JWT: ${SECRET_JWT:-change-me-before-production}
      CLIENT_URL: http://localhost:${FRONTEND_PORT:-8080}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-30}
      DB_CONNECT_RETRY_DELAY_MS: ${DB_CONNECT_RETRY_DELAY_MS:-2000}
      SEED_ADMIN_CIN: ${SEED_ADMIN_CIN:-RH000001}
      SEED_ADMIN_PRENOM: ${SEED_ADMIN_PRENOM:-Admin}
      SEED_ADMIN_NOM: ${SEED_ADMIN_NOM:-RH}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-rh.admin@skatys.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123}
    ports:
      - "${API_PORT:-3000}:3000"

  frontend:
    build:
      context: ./server/frontEnd
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  mysql_data:
